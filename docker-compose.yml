services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: corpassist
      POSTGRES_PASSWORD: corpassist
      POSTGRES_DB: corpassist
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpassist -d corpassist"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "curl -sf http://ollama:11434/api/pull -d '{\"name\": \"gemma3:4b\"}' &&
             curl -sf http://ollama:11434/api/pull -d '{\"name\": \"bge-m3\"}'"

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_USER: corpassist
      POSTGRES_PASSWORD: corpassist
      POSTGRES_DB: corpassist
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: super-secret-demo-key
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gemma3:4b
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_DIM: '1024'
      RAG_TOP_K: '5'
      RAG_MIN_SCORE: '0.45'
      SEMANTIC_CACHE_ENABLED: 'true'
      SEMANTIC_CACHE_THRESHOLD: '0.92'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - '8000:8000'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    ports:
      - '5173:5173'
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
